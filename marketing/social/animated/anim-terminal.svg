<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0a0a0f"/>

  <!-- terminal window -->
  <rect x="200" y="170" width="1200" height="560" rx="18" fill="#0f1117" stroke="#1f2937" stroke-width="2"/>
  <rect x="200" y="170" width="1200" height="58" rx="18" fill="#151823"/>
  <rect x="200" y="210" width="1200" height="18" fill="#151823"/>
  <circle cx="240" cy="199" r="9" fill="#ef4444"/>
  <circle cx="272" cy="199" r="9" fill="#f59e0b"/>
  <circle cx="304" cy="199" r="9" fill="#22c55e"/>
  <text x="800" y="206" font-family="'JetBrains Mono', Consolas, monospace" font-size="20" fill="#64748b" text-anchor="middle">karst — zsh</text>

  <g font-family="'JetBrains Mono', Consolas, monospace" font-size="30">
    <text x="250" y="320" fill="#34d399">$</text>
    <!-- typed command revealed by expanding clip -->
    <clipPath id="type"><rect x="290" y="290" height="44" width="0"><animate attributeName="width" values="0;0;980;980;980" keyTimes="0;0.04;0.42;0.95;1" dur="6s" repeatCount="indefinite"/></rect></clipPath>
    <g clip-path="url(#type)">
      <text x="296" y="320" fill="#e2e8f0">karst ask <tspan fill="#fbbf24">"how does auth work?"</tspan></text>
    </g>
    <!-- caret -->
    <rect y="293" width="14" height="34" fill="#34d399">
      <animate attributeName="x" values="296;296;1276;1276" keyTimes="0;0.04;0.42;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- answer block fades in after typing -->
    <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.46;0.56;0.95;1" dur="6s" repeatCount="indefinite"/>
      <text x="250" y="400" fill="#94a3b8" font-size="26">Sessions are issued in</text>
      <text x="250" y="438" fill="#818cf8" font-size="26">auth.py:42</text>
      <text x="540" y="438" fill="#94a3b8" font-size="26">via iron-session, verified by</text>
      <text x="250" y="476" fill="#818cf8" font-size="26">middleware.ts:18</text>
      <text x="560" y="476" fill="#94a3b8" font-size="26">on every request.</text>

      <rect x="250" y="520" width="900" height="78" rx="12" fill="#0c1322" stroke="#1e293b" stroke-width="2"/>
      <text x="274" y="552" fill="#475569" font-size="20">cited from</text>
      <text x="274" y="582" fill="#34d399" font-size="22">auth.py · middleware.ts · session.py</text>
      <text x="1130" y="568" fill="#475569" font-size="20" text-anchor="end">3 sources</text>
    </g>
  </g>

  <text x="800" y="800" font-family="'Segoe UI', Inter, sans-serif" font-size="34" font-weight="600" fill="#f8fafc" text-anchor="middle">Ask your codebase. Get cited answers.</text>
  <text x="800" y="850" font-family="'Segoe UI', Inter, sans-serif" font-size="26" fill="#94a3b8" text-anchor="middle">pip install karst</text>
</svg>
