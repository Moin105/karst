<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0a0a0f"/>
  <text x="800" y="120" font-family="'Segoe UI', Inter, sans-serif" font-size="56" font-weight="700" fill="#f8fafc" text-anchor="middle">Per-team isolation, enforced</text>
  <text x="800" y="172" font-family="'Segoe UI', Inter, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">a key scoped to your repos can't read anyone else's — checked on every call</text>

  <!-- the team's key -->
  <rect x="120" y="400" width="300" height="100" rx="14" fill="#13131c" stroke="#818cf8" stroke-width="2"/>
  <text x="270" y="438" font-family="'JetBrains Mono', Consolas, monospace" font-size="22" fill="#c7d2fe" text-anchor="middle">team: acme</text>
  <text x="270" y="472" font-family="'JetBrains Mono', Consolas, monospace" font-size="18" fill="#64748b" text-anchor="middle">kst_sk_••• · repos: acme-*</text>

  <!-- gateway -->
  <rect x="560" y="380" width="240" height="140" rx="16" fill="#0f1117" stroke="#1f2937" stroke-width="2"/>
  <text x="680" y="440" font-family="'Segoe UI',sans-serif" font-size="28" font-weight="600" fill="#f8fafc" text-anchor="middle">gateway</text>
  <text x="680" y="472" font-family="'JetBrains Mono',monospace" font-size="16" fill="#94a3b8" text-anchor="middle">scope + repo check</text>

  <!-- target repos -->
  <rect x="1120" y="300" width="340" height="96" rx="14" fill="#0c1322" stroke="#1e293b" stroke-width="2"/>
  <text x="1150" y="358" font-family="'JetBrains Mono',monospace" font-size="24" fill="#cbd5e1">acme-app</text>
  <rect x="1120" y="520" width="340" height="96" rx="14" fill="#0c1322" stroke="#1e293b" stroke-width="2"/>
  <text x="1150" y="578" font-family="'JetBrains Mono',monospace" font-size="24" fill="#cbd5e1">other-team-app</text>

  <!-- connectors -->
  <line x1="420" y1="450" x2="560" y2="450" stroke="#334155" stroke-width="3"/>
  <path d="M800 430 L1120 348" stroke="#334155" stroke-width="3" fill="none"/>
  <path d="M800 470 L1120 568" stroke="#334155" stroke-width="3" fill="none"/>

  <!-- ALLOWED request -> acme-app -->
  <circle r="10" fill="#34d399">
    <animateMotion path="M270 450 L560 450 L800 430 L1120 348" dur="4s" keyPoints="0;0.35;0.55;1" keyTimes="0;0.35;0.55;1" calcMode="linear" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.9;0.95;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.55;0.62;0.95;1" dur="4s" repeatCount="indefinite"/>
    <circle cx="1290" cy="280" r="22" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
    <path d="M1281 280l6 7 12-14" stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1320" y="287" font-family="'JetBrains Mono',monospace" font-size="20" fill="#34d399">200 OK</text>
  </g>

  <!-- DENIED request -> other-team-app : travels to gateway, gets bounced -->
  <circle r="10" fill="#f87171">
    <animateMotion path="M270 450 L560 450 L680 470 L560 470" dur="4s" keyPoints="0;0.32;0.45;0.62" keyTimes="0;0.32;0.45;0.62" calcMode="linear" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0;0" keyTimes="0;0.05;0.45;0.6;0.62;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- barrier on the denied path -->
  <line x1="820" y1="500" x2="820" y2="600" stroke="#7f1d1d" stroke-width="4" stroke-dasharray="6 6"/>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.52;0.95;1" dur="4s" repeatCount="indefinite"/>
    <circle cx="900" cy="568" r="22" fill="#450a0a" stroke="#f87171" stroke-width="2"/>
    <path d="M892 560l16 16M908 560l-16 16" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
    <text x="932" y="575" font-family="'JetBrains Mono',monospace" font-size="20" fill="#f87171">403 forbidden</text>
  </g>

  <text x="800" y="820" font-family="'Segoe UI',sans-serif" font-size="30" fill="#94a3b8" text-anchor="middle">One shared gateway. Many teams. No cross-tenant reads.</text>
</svg>
