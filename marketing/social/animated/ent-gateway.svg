<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0a0a0f"/>
  <text x="800" y="120" font-family="'Segoe UI', Inter, sans-serif" font-size="56" font-weight="700" fill="#f8fafc" text-anchor="middle">One endpoint for the whole org</text>
  <text x="800" y="172" font-family="'Segoe UI', Inter, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">every dev's AI tool points at one authenticated, metered MCP gateway</text>

  <!-- clients -->
  <g font-family="'JetBrains Mono', Consolas, monospace" font-size="22" text-anchor="middle">
    <rect x="120" y="300" width="220" height="64" rx="12" fill="#13131c" stroke="#374151" stroke-width="2"/><text x="230" y="340" fill="#cbd5e1">Cursor</text>
    <rect x="120" y="418" width="220" height="64" rx="12" fill="#13131c" stroke="#374151" stroke-width="2"/><text x="230" y="458" fill="#cbd5e1">Claude Code</text>
    <rect x="120" y="536" width="220" height="64" rx="12" fill="#13131c" stroke="#374151" stroke-width="2"/><text x="230" y="576" fill="#cbd5e1">VS Code</text>
  </g>

  <!-- gateway -->
  <rect x="640" y="350" width="300" height="200" rx="18" fill="#0f1117" stroke="#818cf8" stroke-width="2.5"/>
  <circle cx="790" cy="424" r="34" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <path d="M778 424v-10a12 12 0 0 1 24 0v10" fill="none" stroke="#c7d2fe" stroke-width="3"/>
  <rect x="776" y="424" width="28" height="22" rx="4" fill="#c7d2fe"/>
  <text x="790" y="492" font-family="'Segoe UI',sans-serif" font-size="26" font-weight="600" fill="#f8fafc" text-anchor="middle">karst gateway</text>
  <text x="790" y="522" font-family="'JetBrains Mono',monospace" font-size="16" fill="#94a3b8" text-anchor="middle">auth · meter · scope</text>
  <rect x="640" y="350" width="300" height="200" rx="18" fill="none" stroke="#818cf8" stroke-width="2.5" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- engine -->
  <rect x="1200" y="384" width="260" height="132" rx="16" fill="#0c1322" stroke="#34d399" stroke-width="2"/>
  <text x="1330" y="442" font-family="'Segoe UI',sans-serif" font-size="26" font-weight="600" fill="#f8fafc" text-anchor="middle">karst engine</text>
  <text x="1330" y="474" font-family="'JetBrains Mono',monospace" font-size="16" fill="#34d399" text-anchor="middle">graph · packs · index</text>

  <!-- connectors -->
  <line x1="340" y1="332" x2="640" y2="412" stroke="#334155" stroke-width="2.5"/>
  <line x1="340" y1="450" x2="640" y2="450" stroke="#334155" stroke-width="2.5"/>
  <line x1="340" y1="568" x2="640" y2="488" stroke="#334155" stroke-width="2.5"/>
  <line x1="940" y1="450" x2="1200" y2="450" stroke="#334155" stroke-width="2.5"/>

  <!-- request dots flowing in, staggered -->
  <circle r="8" fill="#818cf8"><animateMotion path="M340 332 L640 412" dur="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle r="8" fill="#818cf8"><animateMotion path="M340 450 L640 450" dur="1.8s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/></circle>
  <circle r="8" fill="#818cf8"><animateMotion path="M340 568 L640 488" dur="1.8s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="1.8s" begin="1.2s" repeatCount="indefinite"/></circle>
  <!-- gateway -> engine -->
  <circle r="8" fill="#34d399"><animateMotion path="M940 450 L1200 450" dur="1.4s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.4s" begin="0.4s" repeatCount="indefinite"/></circle>

  <text x="800" y="800" font-family="'Segoe UI',sans-serif" font-size="30" fill="#94a3b8" text-anchor="middle">No per-dev setup. One governed door. Every call logged.</text>
</svg>
