<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGlow" cx="20%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="1" />
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="1" />
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1f2937" stroke-width="1" opacity="0.6" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGlow)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Left: pentapod mark (Rocky, the Eridian) scaled up from the 40x40 mark -->
  <g transform="translate(60, 195) scale(6)">
    <line x1="20" y1="13.6" x2="20" y2="4.5" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="26.09" y1="18.02" x2="34.74" y2="15.21" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="23.76" y1="25.18" x2="29.11" y2="32.54" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="16.24" y1="25.18" x2="10.89" y2="32.54" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="13.91" y1="18.02" x2="5.26" y2="15.21" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="20" cy="4.5" r="2.1" fill="#ffffff"/>
    <circle cx="34.74" cy="15.21" r="2.1" fill="#ffffff"/>
    <circle cx="29.11" cy="32.54" r="2.1" fill="#ffffff"/>
    <circle cx="10.89" cy="32.54" r="2.1" fill="#ffffff"/>
    <circle cx="5.26" cy="15.21" r="2.1" fill="#ffffff"/>
    <polygon points="20,13.6 26.09,18.02 23.76,25.18 16.24,25.18 13.91,18.02" fill="#818cf8" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="20,16.8 23.04,19.01 21.88,22.59 18.12,22.59 16.96,19.01" fill="#6366f1"/>
  </g>

  <!-- Right: wordmark + tagline -->
  <g transform="translate(440, 0)" font-family="Inter, system-ui, sans-serif" fill="#f8fafc">
    <text x="0" y="280" font-size="128" font-weight="700" letter-spacing="-2">karst</text>
    <text x="6" y="350" font-size="36" font-weight="500" fill="#94a3b8">code context for AI dev tools</text>
    <g transform="translate(6, 400)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" fill="#818cf8">
      <text x="0" y="0">MCP-native &#183; Apache 2.0 &#183; Self-hosted</text>
    </g>
  </g>
</svg>
