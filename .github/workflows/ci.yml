name: CI

# Runs the test suite on every push/PR, plus a real-embedder end-to-end smoke
# (index -> ask) so integration bugs like the embedder batch-size OOM get caught
# automatically.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit + integration tests (fast, no model)
        run: pytest -q

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/karst-model
          key: karst-fastembed-bge-small-en-v1.5-v1

      - name: End-to-end smoke (real embedder)
        env:
          KARST_E2E: "1"
          KARST_TEST_MODEL_CACHE: ~/.cache/karst-model
        run: pytest -q tests/test_e2e_smoke.py
